<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="autopilot-title autopilot-desc">
  <title id="autopilot-title">Autopilot - The False Confidence</title>
  <desc id="autopilot-desc">The apprentice (you) stands on a pedestal, eyes closed in blissful autopilot, arms up conducting like an orchestra maestro. Three identical brooms march past in formation, each with arms carrying buckets and their bundle bristles forked into walking legs. The brooms look imposing in their uniformity - they just keep multiplying exactly the same. Sparkles drift lazily as you've stopped paying attention. The scene captures that dangerous moment of false confidence when everything seems to be working on its own and you drift into mindless approval mode.</desc>

  <defs>
    <linearGradient id="bucket-autopilot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7355;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6b5344;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5a4a3a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="water-autopilot" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>

    <symbol id="bucket" overflow="visible">
      <path d="M -10,-3 Q 0,-6 10,-3 L 10,8 Q 10,14 0,14 Q -10,14 -10,8 Z" fill="url(#bucket-autopilot)"/>
      <line x1="-7" y1="-3" x2="-7" y2="13" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
      <line x1="-3" y1="-3" x2="-3" y2="14" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
      <line x1="0" y1="-3" x2="0" y2="14" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
      <line x1="3" y1="-3" x2="3" y2="14" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
      <line x1="7" y1="-3" x2="7" y2="13" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
      <ellipse cx="0" cy="-1" rx="8.5" ry="2" fill="url(#water-autopilot)">
        <animate attributeName="rx" values="8.5;7.5;8.5;9;8.5" dur="1.7s" begin="0.9s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="2;2.8;2;1.5;2" dur="1.7s" begin="0.9s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="-1;-1.5;-1;-0.5;-1" dur="1.7s" begin="0.9s" repeatCount="indefinite"/>
      </ellipse>
      <path d="M -10,-3 Q 0,-13 10,-3" stroke="#6b7280" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="-10" cy="-3" r="1.5" fill="#4b5563"/>
      <circle cx="10" cy="-3" r="1.5" fill="#4b5563"/>
    </symbol>

    <symbol id="broom-besom" overflow="visible">
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0 0 11; -3 0 11; 0 0 11; 3 0 11; 0 0 11" dur="2.5s" begin="0.9s" repeatCount="indefinite"/>
        <path d="M -10,3 L -8,6 L -6.5,9 L -6,14" fill="#daa520" stroke="#b8860b" stroke-width="1.2"/>
        <path d="M -7,3 L -6,6 L -4.5,9 L -4,14" fill="#cd9a1b" stroke="#b8860b" stroke-width="1.2"/>
        <path d="M -4,3 L -3.5,6 L -2.5,9 L -2,14" fill="#daa520" stroke="#b8860b" stroke-width="1.2"/>
        <path d="M 4,3 L 3.5,6 L 2.5,9 L 2,14" fill="#daa520" stroke="#b8860b" stroke-width="1.2"/>
        <path d="M 7,3 L 6,6 L 4.5,9 L 4,14" fill="#cd9a1b" stroke="#b8860b" stroke-width="1.2"/>
        <path d="M 10,3 L 8,6 L 6.5,9 L 6,14" fill="#daa520" stroke="#b8860b" stroke-width="1.2"/>
        <path d="M -8.5,3 L -7,6 L -5.5,9 L -5,14" fill="#daa520" stroke="#b8860b" stroke-width="1" opacity="0.7"/>
        <path d="M -5.5,3 L -5,6 L -3.5,9 L -3,14" fill="#cd9a1b" stroke="#b8860b" stroke-width="1" opacity="0.7"/>
        <path d="M -1,3 L -1,6 L -0.5,9 L 0,14" fill="#daa520" stroke="#b8860b" stroke-width="1" opacity="0.7"/>
        <path d="M 1,3 L 1,6 L 0.5,9 L 0,14" fill="#cd9a1b" stroke="#b8860b" stroke-width="1" opacity="0.7"/>
        <path d="M 5.5,3 L 5,6 L 3.5,9 L 3,14" fill="#daa520" stroke="#b8860b" stroke-width="1" opacity="0.7"/>
        <path d="M 8.5,3 L 7,6 L 5.5,9 L 5,14" fill="#cd9a1b" stroke="#b8860b" stroke-width="1" opacity="0.7"/>
        <rect x="-7" y="8" width="14" height="6" fill="#654321" rx="1"/>
        <path d="M -7,14 L -10,20 L -13,30 L -11,40" fill="#daa520" stroke="#b8860b" stroke-width="0.8"/>
        <path d="M -5,14 L -8,20 L -10,30 L -8,40" fill="#cd9a1b" stroke="#b8860b" stroke-width="0.8"/>
        <path d="M -3,14 L -5,20 L -7,30 L -5,40" fill="#daa520" stroke="#b8860b" stroke-width="0.8"/>
        <path d="M 3,14 L 5,20 L 7,30 L 5,40" fill="#daa520" stroke="#b8860b" stroke-width="0.8"/>
        <path d="M 5,14 L 8,20 L 10,30 L 8,40" fill="#cd9a1b" stroke="#b8860b" stroke-width="0.8"/>
        <path d="M 7,14 L 10,20 L 13,30 L 11,40" fill="#daa520" stroke="#b8860b" stroke-width="0.8"/>
        <path d="M -1,14 L -2,20 L -3,30 L -2,40" fill="#cd9a1b" stroke="#b8860b" stroke-width="0.8"/>
        <path d="M 1,14 L 2,20 L 3,30 L 2,40" fill="#cd9a1b" stroke="#b8860b" stroke-width="0.8"/>
      </g>
    </symbol>

    <symbol id="broom-front" overflow="visible">
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0 0 20; 2 0 20; 0 0 20; -2 0 20; 0 0 20" dur="2.5s" begin="0.9s" repeatCount="indefinite"/>
        <rect x="-4" y="-80" width="8" height="100" fill="#8b4513" rx="3"/>
        <!-- Left arm -->
        <path d="M -4,-40 Q -16,-35 -25,-25" stroke="#8b4513" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M -25,-25 L -28,-18" stroke="#8b4513" stroke-width="4" fill="none" stroke-linecap="round"/>
        <!-- Right arm -->
        <path d="M 4,-40 Q 16,-35 25,-25" stroke="#8b4513" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M 25,-25 L 28,-18" stroke="#8b4513" stroke-width="4" fill="none" stroke-linecap="round"/>
        <use href="#broom-besom"/>
        <use href="#bucket" transform="translate(-26, -7)"/>
        <use href="#bucket" transform="translate(26, -7)"/>
      </g>
    </symbol>
  </defs>

  <!-- Dreamy background -->
  <rect width="400" height="300" fill="#e0f2fe"/>
  <rect width="400" height="300" fill="#fef3c7" opacity="0.15"/>

  <!-- The apprentice (you) - eyes closed, conducting -->
  <g transform="translate(80, 165)">
    <path d="M -18,20 L -12,-5 L 12,-5 L 18,20 L 16,48 L -16,48 Z" fill="#3b82f6"/>
    <path d="M 12,2 Q 18,12 20,28" stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="21" cy="30" r="3" fill="#fde68a"/>
    <path d="M -12,2 Q -18,-3 -22,-15" stroke="#3b82f6" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="-23" cy="-17" r="3" fill="#fde68a"/>
    <circle cx="0" cy="-2" r="13" fill="#fde68a" stroke="#3b82f6" stroke-width="1.5"/>
    <path d="M -5,-4 Q -3,-2 -1,-4" stroke="#1e40af" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 1,-4 Q 3,-2 5,-4" stroke="#1e40af" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M -4,2 Q 0,4 4,2" stroke="#1e40af" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <g transform="translate(0, -10) rotate(-8)">
      <path d="M -12,0 L 0,-28 L 12,0 Z" fill="#3b82f6"/>
      <ellipse cx="0" cy="0" rx="13" ry="4" fill="#3b82f6"/>
    </g>
  </g>

  <!-- Three identical marching brooms (draw left-to-right: leftmost first, rightmost last on top) -->
  <!-- @phase phase=0s --> <use href="#broom-front" transform="translate(200, 200)"/>
  <!-- @phase phase=0.3s --> <use href="#broom-front" transform="translate(275, 210)"/>
  <!-- @phase phase=0.6s --> <use href="#broom-front" transform="translate(350, 205)"/>

  <!-- Lazy, dreamy sparkles (autopilot mode) -->
  <g opacity="0.5">
    <circle cx="120" cy="60" r="2" fill="#fbbf24">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="60;55;60" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="100" r="2" fill="#fbbf24">
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="180;185;180" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="80" r="1.5" fill="#fde047">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="80;76;80" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="320" cy="90" r="1.5" fill="#fde047">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="320;324;320" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="75" r="2.2" fill="#fbbf24">
      <animate attributeName="opacity" values="0.35;0.65;0.35" dur="3.3s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="75;70;75" dur="4.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="95" r="1.8" fill="#fde047">
      <animate attributeName="opacity" values="0.45;0.75;0.45" dur="3.6s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="210;214;210" dur="4.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="70" r="1.6" fill="#fbbf24">
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="70;66;70" dur="3.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="105" r="1.4" fill="#fde047">
      <animate attributeName="opacity" values="0.35;0.65;0.35" dur="3.1s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="350;353;350" dur="4.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Dreamy text -->
  <text x="200" y="35" text-anchor="middle" font-size="16" font-family="system-ui, sans-serif" fill="#0369a1" font-style="italic" opacity="0.8">Everything's working perfectly... 😌</text>
</svg>
