<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="pm-title pm-desc">
  <title id="pm-title">Partial Mastery - Vigilant but not yet in full control</title>
  <desc id="pm-desc">Small figure of the apprentice in the upper right background, watching with a raised eyebrow expression, holding a staff with a faint glow. A single broom walks in the lower left foreground. A weak, flickering beam of control connects them — partial but unstable mastery.</desc>

  <defs>
    <linearGradient id="pm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eef2ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fdf4e8;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="pm-orb-glow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="pm-bucket" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7355;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#6b5344;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5a4a3a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pm-water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:0.8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#pm-bg)"/>

  <!-- Character in upper right, small -->
  <g transform="translate(315, 95)">
    <!-- Robes -->
    <path d="M -13,0 L -10,-28 L -8,-42 L 8,-42 L 10,-28 L 13,0 Z" fill="#6366f1" opacity="0.9"/>
    <!-- Body -->
    <rect x="-8" y="-42" width="16" height="32" fill="#8b5cf6" rx="3"/>
    <!-- Head -->
    <circle cx="0" cy="-52" r="11" fill="#fde68a" stroke="#8b5cf6" stroke-width="1.5"/>

    <!-- Hat -->
    <path d="M -9,-60 L 0,-80 L 9,-60 Z" fill="#6366f1"/>
    <ellipse cx="0" cy="-60" rx="10" ry="2.8" fill="#6366f1"/>

    <!-- Left eyebrow: RAISED (viewer's left = character's right) -->
    <!-- Arched high, well above eye level -->
    <path d="M -6,-56 Q -3,-62 0,-59" stroke="#4c1d95" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <!-- Right eyebrow: normal level -->
    <path d="M 1,-55 Q 4,-57 7,-55" stroke="#4c1d95" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Eyes (alert, open) -->
    <circle cx="-3" cy="-52" r="1.8" fill="#4c1d95"/>
    <circle cx="3" cy="-52" r="1.8" fill="#4c1d95"/>

    <!-- Slight asymmetric mouth (skeptical smirk) -->
    <path d="M -3,-46 Q 0,-45 4,-47" stroke="#4c1d95" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Staff -->
    <line x1="-15" y1="-32" x2="-15" y2="6" stroke="#8b5cf6" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Orb on staff - faint, flickering -->
    <circle cx="-15" cy="-38" r="9" fill="url(#pm-orb-glow)">
      <animate attributeName="r" values="9;11;8;10;9" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.9;0.4;0.7;0.6" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-15" cy="-38" r="5" fill="#ddd6fe" opacity="0.7"/>
    <circle cx="-15" cy="-38" r="3" fill="#a78bfa">
      <animate attributeName="opacity" values="0.5;0.9;0.4;0.8;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Weak, flickering control beam: orb (~300, 57) → broom handle top (~88, 165) -->
  <!-- Primary beam -->
  <line x1="300" y1="58" x2="88" y2="166"
        stroke="#8b5cf6" stroke-width="1.5"
        stroke-dasharray="6,5">
    <animate attributeName="stroke-dashoffset" values="0;11" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0.6;0.05;0.6;0.6;0.05;0.6;0.1;0.6" dur="1.8s" repeatCount="indefinite"/>
  </line>
  <!-- Secondary faint accent beam -->
  <line x1="300" y1="58" x2="88" y2="166"
        stroke="#c4b5fd" stroke-width="0.8"
        stroke-dasharray="3,8">
    <animate attributeName="stroke-dashoffset" values="11;0" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.3;0;0.3;0;0.3" dur="1.8s" repeatCount="indefinite"/>
  </line>

  <!-- Broom in lower left foreground -->
  <g transform="translate(88, 252)">
    <!-- Handle, arms, and buckets wobble together -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0 0 20; 2.5 0 20; 0 0 20; -2.5 0 20; 0 0 20"
        dur="2.5s" repeatCount="indefinite"/>

      <!-- Handle -->
      <rect x="-4" y="-87" width="8" height="107" fill="#8b4513" rx="3"/>

      <!-- Left arm with bucket -->
      <path d="M -4,-46 Q -15,-41 -22,-29" stroke="#8b4513" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M -22,-29 L -24,-23" stroke="#8b4513" stroke-width="3" fill="none" stroke-linecap="round"/>
      <g transform="translate(-28, -17)">
        <ellipse cx="0" cy="8" rx="10" ry="6" fill="#64748b" opacity="0.3"/>
        <path d="M -10,7 L -9,-3 Q -9,-5 0,-5 Q 9,-5 9,-3 L 10,7 Q 10,9 0,9 Q -10,9 -10,7 Z" fill="url(#pm-bucket)"/>
        <line x1="-7" y1="-3" x2="-8" y2="7" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
        <line x1="0" y1="-5" x2="0" y2="8" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
        <line x1="7" y1="-3" x2="8" y2="7" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
        <ellipse cx="0" cy="-3" rx="9" ry="2" fill="#94a3b8"/>
        <ellipse cx="0" cy="-4" rx="9" ry="1" fill="#cbd5e1" opacity="0.6"/>
        <ellipse cx="0" cy="-1" rx="8" ry="2.5" fill="url(#pm-water)">
          <animate attributeName="rx" values="8;7.5;8;8.5;8" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="ry" values="2.5;3;2.5;2;2.5" dur="2s" repeatCount="indefinite"/>
        </ellipse>
        <path d="M -7,-3 Q 0,-10 7,-3" stroke="#6b7280" stroke-width="2" fill="none" stroke-linecap="round"/>
        <circle cx="-7" cy="-3" r="1.2" fill="#4b5563"/>
        <circle cx="7" cy="-3" r="1.2" fill="#4b5563"/>
      </g>

      <!-- Right arm with bucket -->
      <path d="M 4,-46 Q 15,-41 22,-29" stroke="#8b4513" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M 22,-29 L 24,-23" stroke="#8b4513" stroke-width="3" fill="none" stroke-linecap="round"/>
      <g transform="translate(28, -17)">
        <ellipse cx="0" cy="8" rx="10" ry="6" fill="#64748b" opacity="0.3"/>
        <path d="M -10,7 L -9,-3 Q -9,-5 0,-5 Q 9,-5 9,-3 L 10,7 Q 10,9 0,9 Q -10,9 -10,7 Z" fill="url(#pm-bucket)"/>
        <line x1="-7" y1="-3" x2="-8" y2="7" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
        <line x1="0" y1="-5" x2="0" y2="8" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
        <line x1="7" y1="-3" x2="8" y2="7" stroke="#64748b" stroke-width="0.5" opacity="0.4"/>
        <ellipse cx="0" cy="-3" rx="9" ry="2" fill="#94a3b8"/>
        <ellipse cx="0" cy="-4" rx="9" ry="1" fill="#cbd5e1" opacity="0.6"/>
        <ellipse cx="0" cy="-1" rx="8" ry="2.5" fill="url(#pm-water)">
          <animate attributeName="rx" values="8;8.5;8;7.5;8" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="ry" values="2.5;2;2.5;3;2.5" dur="2s" repeatCount="indefinite"/>
        </ellipse>
        <path d="M -7,-3 Q 0,-10 7,-3" stroke="#6b7280" stroke-width="2" fill="none" stroke-linecap="round"/>
        <circle cx="-7" cy="-3" r="1.2" fill="#4b5563"/>
        <circle cx="7" cy="-3" r="1.2" fill="#4b5563"/>
      </g>
    </g>

    <!-- Besom bundle (swivels opposite to handle) -->
    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0 0 16; -3 0 16; 0 0 16; 3 0 16; 0 0 16"
        dur="2.5s" repeatCount="indefinite"/>

      <!-- Top bristles -->
      <path d="M -10,3 L -8,8 L -6.5,13 L -6,18" fill="#daa520" stroke="#b8860b" stroke-width="1.2"/>
      <path d="M -7,3 L -6,8 L -4.5,13 L -4,18" fill="#cd9a1b" stroke="#b8860b" stroke-width="1.2"/>
      <path d="M -4,3 L -3.5,8 L -2.5,13 L -2,18" fill="#daa520" stroke="#b8860b" stroke-width="1.2"/>
      <path d="M 4,3 L 3.5,8 L 2.5,13 L 2,18" fill="#daa520" stroke="#b8860b" stroke-width="1.2"/>
      <path d="M 7,3 L 6,8 L 4.5,13 L 4,18" fill="#cd9a1b" stroke="#b8860b" stroke-width="1.2"/>
      <path d="M 10,3 L 8,8 L 6.5,13 L 6,18" fill="#daa520" stroke="#b8860b" stroke-width="1.2"/>

      <!-- Secondary bristles -->
      <path d="M -8.5,3 L -7,8 L -5.5,13 L -5,18" fill="#daa520" stroke="#b8860b" stroke-width="1" opacity="0.7"/>
      <path d="M -5.5,3 L -5,8 L -3.5,13 L -3,18" fill="#cd9a1b" stroke="#b8860b" stroke-width="1" opacity="0.7"/>
      <path d="M -1,3 L -1,8 L -0.5,13 L 0,18" fill="#daa520" stroke="#b8860b" stroke-width="1" opacity="0.7"/>
      <path d="M 1,3 L 1,8 L 0.5,13 L 0,18" fill="#cd9a1b" stroke="#b8860b" stroke-width="1" opacity="0.7"/>
      <path d="M 5.5,3 L 5,8 L 3.5,13 L 3,18" fill="#daa520" stroke="#b8860b" stroke-width="1" opacity="0.7"/>
      <path d="M 8.5,3 L 7,8 L 5.5,13 L 5,18" fill="#cd9a1b" stroke="#b8860b" stroke-width="1" opacity="0.7"/>

      <!-- Binding band -->
      <rect x="-7" y="13" width="14" height="6" fill="#654321" rx="1"/>

      <!-- Bottom bristles (walking legs) -->
      <path d="M -7,19 L -10,26 L -13,36 L -11,46" fill="#daa520" stroke="#b8860b" stroke-width="0.8"/>
      <path d="M -5,19 L -8,26 L -10,36 L -8,46" fill="#cd9a1b" stroke="#b8860b" stroke-width="0.8"/>
      <path d="M -3,19 L -5,26 L -7,36 L -5,46" fill="#daa520" stroke="#b8860b" stroke-width="0.8"/>
      <path d="M 3,19 L 5,26 L 7,36 L 5,46" fill="#daa520" stroke="#b8860b" stroke-width="0.8"/>
      <path d="M 5,19 L 8,26 L 10,36 L 8,46" fill="#cd9a1b" stroke="#b8860b" stroke-width="0.8"/>
      <path d="M 7,19 L 10,26 L 13,36 L 11,46" fill="#daa520" stroke="#b8860b" stroke-width="0.8"/>
      <path d="M -1,19 L -2,26 L -3,36 L -2,46" fill="#cd9a1b" stroke="#b8860b" stroke-width="0.8"/>
      <path d="M 1,19 L 2,26 L 3,36 L 2,46" fill="#cd9a1b" stroke="#b8860b" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Faint floating word in mid-space (sparse, not commanding) -->
  <text x="200" y="145" font-family="monospace" font-size="11" fill="#6366f1" opacity="0.3">expect()</text>

  <!-- Calm but watchful sparkles (few, dim) -->
  <circle cx="170" cy="105" r="1.5" fill="#a78bfa" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="235" cy="165" r="1.3" fill="#c4b5fd" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="195" cy="80" r="1.2" fill="#a78bfa" opacity="0.35">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Caption -->
  <text x="200" y="285" text-anchor="middle" font-size="14" font-family="system-ui, sans-serif" fill="#6366f1" font-style="italic" opacity="0.7">Behaving, for now.</text>
</svg>
