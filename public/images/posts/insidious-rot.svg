<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="rot-title rot-desc">
  <title id="rot-title">The Insidious Rot - Code Decay</title>
  <desc id="rot-desc">A deceptively clean-looking structure with invisible cracks spreading through it. Beautiful on the surface, rotting underneath. The danger you can't see until it's too late.</desc>

  <defs>
    <linearGradient id="surface-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bae6fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="crack-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#dc2626;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Clean background -->
  <rect width="400" height="300" fill="#f8fafc"/>

  <!-- Beautiful scaffolding structure -->
  <g stroke="#0284c7" stroke-width="3" fill="none" opacity="0.9">
    <!-- Vertical beams -->
    <line x1="80" y1="80" x2="80" y2="240"/>
    <line x1="150" y1="60" x2="150" y2="240"/>
    <line x1="250" y1="60" x2="250" y2="240"/>
    <line x1="320" y1="80" x2="320" y2="240"/>

    <!-- Horizontal beams -->
    <line x1="80" y1="120" x2="150" y2="120"/>
    <line x1="150" y1="100" x2="250" y2="100"/>
    <line x1="250" y1="120" x2="320" y2="120"/>

    <line x1="80" y1="160" x2="150" y2="160"/>
    <line x1="150" y1="140" x2="250" y2="140"/>
    <line x1="250" y1="160" x2="320" y2="160"/>

    <line x1="80" y1="200" x2="150" y2="200"/>
    <line x1="150" y1="180" x2="250" y2="180"/>
    <line x1="250" y1="200" x2="320" y2="200"/>
  </g>

  <!-- Connection nodes (look solid) -->
  <g fill="#0284c7" opacity="0.9">
    <circle cx="80" cy="120" r="5"/>
    <circle cx="150" cy="100" r="5"/>
    <circle cx="250" cy="100" r="5"/>
    <circle cx="320" cy="120" r="5"/>
    <circle cx="80" cy="160" r="5"/>
    <circle cx="150" cy="140" r="5"/>
    <circle cx="250" cy="140" r="5"/>
    <circle cx="320" cy="160" r="5"/>
    <circle cx="80" cy="200" r="5"/>
    <circle cx="150" cy="180" r="5"/>
    <circle cx="250" cy="180" r="5"/>
    <circle cx="320" cy="200" r="5"/>
  </g>

  <!-- Invisible cracks spreading (subtle at first, then more visible) -->
  <g stroke="#dc2626" stroke-width="1.5" fill="none" opacity="0.4" filter="url(#glow)">
    <path d="M 150,100 L 145,110 L 150,120" stroke-dasharray="2,2">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M 250,140 L 255,150 L 250,160" stroke-dasharray="2,2">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 150,180 L 145,185 L 150,190" stroke-dasharray="2,2">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- More obvious spreading cracks -->
  <g stroke="#dc2626" stroke-width="2" fill="none" opacity="0.6">
    <path d="M 200,100 Q 195,120 200,140" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" values="0;6" dur="1s" repeatCount="indefinite"/>
    </path>
    <path d="M 200,140 Q 205,160 200,180" stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" values="0;6" dur="1.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Hidden decay spreading from a node -->
  <g opacity="0.5">
    <circle cx="250" cy="140" r="15" fill="none" stroke="#ef4444" stroke-width="1">
      <animate attributeName="r" values="15;25;15" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="140" r="20" fill="none" stroke="#ef4444" stroke-width="1">
      <animate attributeName="r" values="20;30;20" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.05;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Forking paths (logic branches gone wrong) -->
  <g stroke="#f97316" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="4,4">
    <path d="M 80,160 Q 100,165 120,160">
      <animate attributeName="stroke-dashoffset" values="0;8" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 80,160 Q 100,155 120,160">
      <animate attributeName="stroke-dashoffset" values="0;8" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 320,160 Q 300,165 280,160">
      <animate attributeName="stroke-dashoffset" values="0;8" dur="1.3s" repeatCount="indefinite"/>
    </path>
    <path d="M 320,160 Q 300,155 280,160">
      <animate attributeName="stroke-dashoffset" values="0;8" dur="1.3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Hard-coded patches (band-aids on the structure) -->
  <g fill="#fbbf24" opacity="0.7">
    <rect x="145" y="135" width="10" height="10" rx="2">
      <animate attributeName="opacity" values="0.7;0.4;0.7" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="245" y="175" width="10" height="10" rx="2">
      <animate attributeName="opacity" values="0.6;0.3;0.6" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="75" y="195" width="10" height="10" rx="2">
      <animate attributeName="opacity" values="0.5;0.2;0.5" dur="1.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Warning signs (barely visible) with subtle animation -->
  <g opacity="0.3">
    <text x="180" y="90" font-size="12" fill="#dc2626" font-family="monospace">
      ⚠️
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2.5s" repeatCount="indefinite"/>
    </text>
    <text x="270" y="130" font-size="12" fill="#dc2626" font-family="monospace">
      ⚠️
      <animate attributeName="opacity" values="0.4;0.6;0.4" dur="2.8s" repeatCount="indefinite"/>
    </text>
    <text x="140" y="170" font-size="12" fill="#dc2626" font-family="monospace">
      ⚠️
      <animate attributeName="opacity" values="0.35;0.55;0.35" dur="2.3s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- Additional subtle danger sparkles -->
  <g opacity="0.4">
    <circle cx="160" cy="110" r="1.5" fill="#ef4444">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="110;108;110" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="220" cy="150" r="1.3" fill="#f97316">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="220;222;220" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="280" cy="165" r="1.6" fill="#ef4444">
      <animate attributeName="opacity" values="0.25;0.65;0.25" dur="2.7s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="165;162;165" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="190" cy="130" r="1.4" fill="#f97316">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="190;193;190" dur="3.1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Deceptive text -->
  <text x="200" y="30" text-anchor="middle" font-size="16" font-family="system-ui, sans-serif" fill="#0284c7" font-style="italic" opacity="0.8">
    Looks perfect...
  </text>

  <text x="200" y="280" text-anchor="middle" font-size="16" font-family="system-ui, sans-serif" fill="#dc2626" font-style="italic" opacity="0.6">
    ...but the rot spreads invisible 🦠
  </text>
</svg>
